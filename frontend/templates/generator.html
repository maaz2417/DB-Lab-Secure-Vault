{% extends 'base.html' %}

{% block title %}Password Generator - SecureVault{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="vault-header" style="margin-bottom: 2rem;">
        <div>
            <h1 style="font-size: 2rem;">⚡ Password Generator</h1>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Create strong, cryptographically secure passwords</p>
        </div>
    </div>

    <div class="glass-card">
        <!-- Result Bar -->
        <div class="generator-output">
            <span class="gen-pwd" id="generator-result">Click Generate below</span>
            <button type="button" class="btn-icon" title="Copy to Clipboard" onclick="copyGeneratedPassword()">
                📋 Copy
            </button>
        </div>

        <!-- Strength Indicator -->
        <div class="strength-meter">
            <div class="strength-bar" id="gen-strength-bar"></div>
        </div>

        <!-- Configuration Settings -->
        <div class="form-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <label>Password Length</label>
                <strong id="length-val" style="color: var(--accent-indigo);">16</strong>
            </div>
            <input type="range" id="gen-length" min="8" max="64" value="16" style="width:100%; cursor: pointer;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label for="gen-uppercase" style="cursor: pointer;">Include Uppercase Letters (A-Z)</label>
                <input type="checkbox" id="gen-uppercase" checked style="width: 18px; height: 18px; cursor: pointer;">
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label for="gen-lowercase" style="cursor: pointer;">Include Lowercase Letters (a-z)</label>
                <input type="checkbox" id="gen-lowercase" checked style="width: 18px; height: 18px; cursor: pointer;">
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label for="gen-numbers" style="cursor: pointer;">Include Numbers (0-9)</label>
                <input type="checkbox" id="gen-numbers" checked style="width: 18px; height: 18px; cursor: pointer;">
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label for="gen-symbols" style="cursor: pointer;">Include Symbols (!@#$...)</label>
                <input type="checkbox" id="gen-symbols" checked style="width: 18px; height: 18px; cursor: pointer;">
            </div>
        </div>

        <button type="button" id="generate-btn" class="btn btn-primary" style="width: 100%; padding: 0.85rem;">
            Generate Password
        </button>
    </div>
</div>

<script>
    function copyGeneratedPassword() {
        const password = document.getElementById('generator-result').textContent;
        if (password === 'Click Generate below') {
            return;
        }
        
        // Use user clipboard preference if possible (defaulting to 30s)
        const clipboardTimeout = {{ prefs.clipboard_clear_seconds if prefs else '30' }};
        copyToClipboard(password, clipboardTimeout);
    }
    
    // Auto-generate a password on load
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('generate-btn').click();
    });
</script>
{% endblock %}
